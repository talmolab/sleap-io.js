name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (tag/branch/SHA) to build and publish to npm"
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      # npm is retained only for the publish step below: trusted publishing
      # (OIDC) and provenance are npm-registry features that `bun publish` does
      # not support. Dependency install and the build run on Bun.
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # npm trusted publishing (OIDC, tokenless) requires npm >= 11.5.1.
      # Node 22 bundles npm 10.x, which can sign provenance but cannot
      # authenticate via OIDC, so publish 404s. Pin an exact known-good
      # version rather than @latest (a broken @latest sank the v0.3.0 publish).
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11.16.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Publish
        run: npm publish --access public --provenance
